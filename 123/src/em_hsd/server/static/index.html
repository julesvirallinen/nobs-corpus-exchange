<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NoBS Observatory · Corpus Exchange v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#3b5bdb; --accent-soft:#eef1fc; --accent-border:#c7d0f5;
    --ink:#1a1d29; --ink2:#3a4150; --muted:#6b7180; --faint:#9aa0ae;
    --line:#e7e9ef; --line2:#e3e5ed; --surface:#fbfbfd; --panel:#fff;
    --dark:#12141c; --good:#2f7d57; --good-bg:#e8f3ec; --good-border:#bfe0cc;
    --warn:#946f00; --warn-bg:#fdf6ea; --warn-border:#ecd9a8;
    --mono:'Spline Sans Mono',ui-monospace,Menlo,monospace;
    --sev-high:#e8590c; --sev-med:#f08c00; --sev-low:#868e96;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--surface);font-family:'Public Sans',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;}
  button{font-family:inherit;}
  ::selection{background:rgba(59,91,219,.22);}
  .mono{font-family:var(--mono);}
  .scroll::-webkit-scrollbar{width:10px;height:10px;}
  .scroll::-webkit-scrollbar-thumb{background:#d4d7e0;border-radius:6px;}
  .scroll::-webkit-scrollbar-track{background:transparent;}
  @keyframes toastIn{0%{opacity:0;transform:translate(-50%,8px);}12%{opacity:1;transform:translate(-50%,0);}88%{opacity:1;transform:translate(-50%,0);}100%{opacity:0;transform:translate(-50%,8px);}}
  @keyframes spin{to{transform:rotate(360deg);}}

  .app{display:flex;height:100vh;width:100vw;overflow:hidden;}
  /* rail */
  .rail{width:54px;flex:none;background:var(--dark);display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px;}
  .rail .logo{width:28px;height:28px;border-radius:7px;background:var(--accent);margin-bottom:10px;}
  .rail button{width:34px;height:34px;border-radius:8px;border:none;background:transparent;color:#7d8499;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .rail button:hover{background:#1e2230;color:#cdd2df;}
  .rail button.on{background:#262b3b;color:#fff;}
  .rail .me{margin-top:auto;width:28px;height:28px;border-radius:99px;background:#e7eafb;color:var(--accent);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--line);background:var(--panel);flex:none;}
  .brand{font-size:15px;font-weight:800;letter-spacing:-.3px;color:var(--dark);}
  .pill{font-family:var(--mono);font-size:10px;letter-spacing:.6px;color:var(--faint);border:1px solid var(--line2);border-radius:5px;padding:2px 7px;}
  .kbd{font-family:var(--mono);font-size:10.5px;background:#f1f2f6;border:1px solid var(--line2);border-radius:4px;padding:1px 6px;}
  .tag-green{font-size:10.5px;font-family:var(--mono);color:var(--good);background:var(--good-bg);border-radius:99px;padding:3px 9px;}
  .tabnav{display:flex;gap:2px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--panel);flex:none;}
  .tab{position:relative;background:transparent;border:none;padding:13px 14px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
  .tab:hover{color:var(--ink2);}
  .tab.on{color:var(--ink);}
  .tab.on::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:2.5px;border-radius:3px;background:var(--accent);}
  .surface{flex:1;min-height:0;overflow:auto;}

  .wrap{margin:0 auto;padding:28px 24px 64px;}
  h2.title{font-size:22px;font-weight:800;letter-spacing:-.4px;margin:0 0 4px;}
  p.lede{margin:0 0 22px;font-size:14px;color:var(--muted);}
  .card{border:1px solid var(--line2);border-radius:11px;background:var(--panel);}
  .stat{flex:1;border:1px solid var(--line2);border-radius:11px;background:var(--panel);padding:15px 17px;}
  .stat .k{font-size:11.5px;color:var(--faint);font-weight:600;letter-spacing:.2px;}
  .stat .v{font-size:25px;font-weight:800;letter-spacing:-.5px;margin-top:3px;}
  .label{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;color:var(--faint);}
  .btn{font-size:13px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:8px;padding:10px 18px;cursor:pointer;}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn-ghost{font-size:12px;font-weight:600;color:var(--accent);background:var(--panel);border:1px solid var(--accent-border);border-radius:6px;padding:6px 13px;cursor:pointer;}
  .btn-soft{font-size:12px;font-weight:600;color:var(--ink2);background:var(--panel);border:1px solid var(--line2);border-radius:6px;padding:6px 13px;cursor:pointer;}

  /* flow subnav */
  .subnav{display:flex;align-items:center;gap:18px;padding:10px 22px;border-bottom:1px solid var(--line);background:#fcfcfd;position:sticky;top:0;z-index:5;}
  .step{font-size:12.5px;font-weight:600;color:var(--muted);background:transparent;border:none;border-radius:7px;padding:6px 11px;cursor:pointer;}
  .step:hover{background:#f1f2f6;color:var(--ink2);}
  .step.on{background:var(--accent-soft);color:var(--accent);}
  .step.done{color:var(--good);}

  /* upload */
  .drop{border:1.5px dashed #c4cadb;border-radius:13px;background:#fff;padding:34px 24px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
  .drop:hover,.drop.hot{border-color:var(--accent);background:#f7f9ff;}
  .field{flex:1;border:1px solid var(--line2);border-radius:9px;padding:9px 11px;background:#fff;}
  .field .l{font-size:11px;color:var(--faint);}
  .field select,.field input{border:none;outline:none;background:transparent;font-size:13.5px;font-weight:600;color:var(--ink);width:100%;margin-top:2px;font-family:inherit;}
  input[type=range]{width:100%;accent-color:var(--accent);}
  .proc-step{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f4f5f8;}
  .dot{width:18px;height:18px;border-radius:99px;flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .dot.todo{background:#eef0f4;color:#b5bac6;}
  .dot.run{background:var(--accent-soft);color:var(--accent);}
  .dot.ok{background:var(--good-bg);color:var(--good);}

  /* review */
  .facets{width:230px;flex:none;border-right:1px solid var(--line);background:#fafbfc;padding:16px 15px;overflow:auto;}
  .facet-h{display:flex;align-items:center;justify-content:space-between;margin:18px 0 11px;}
  .chk{width:15px;height:15px;border-radius:4px;border:1.5px solid #cdd2de;background:#fff;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;}
  .chk.on{background:var(--accent);border-color:var(--accent);}
  .facet-row{display:flex;align-items:center;gap:8px;font-size:12.5px;cursor:pointer;padding:3px 0;color:var(--ink2);}
  .cdot{width:8px;height:8px;border-radius:99px;flex:none;}
  .preset{font-size:11.5px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line2);border-radius:7px;padding:6px 9px;cursor:pointer;}
  .preset.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border);}

  table{width:100%;border-collapse:collapse;}
  .rowline{border-bottom:1px solid #f1f2f6;}
  .rowline:hover{background:#fafbff;}
  .rowline.sel{background:var(--accent-soft);}
  .sevbadge{font-size:10.5px;font-weight:700;border-radius:99px;padding:2px 9px;text-transform:capitalize;}
  .catbadge{font-size:11.5px;display:inline-flex;align-items:center;gap:7px;}
  .iconbtn{width:26px;height:26px;border-radius:6px;border:1px solid var(--line2);background:#fff;color:var(--muted);cursor:pointer;font-size:12px;}
  .iconbtn:hover{border-color:var(--accent-border);color:var(--accent);background:var(--accent-soft);}
  .footerbar{display:flex;align-items:center;gap:16px;padding:10px 18px;background:var(--dark);color:#aeb3c2;font-family:var(--mono);font-size:11px;flex:none;}
  .footerbar b{color:#fff;background:#262936;border-radius:3px;padding:1px 6px;}
  .detail{background:#f7f8fc;border-top:1px dashed #d8dce8;padding:14px 18px 16px 56px;font-size:12.5px;color:var(--ink2);}
  /* Raw original is on-device-only — blurred to make clear it is never exposed in production. Hover to reveal (dev/audit only). */
  .dev-only{filter:blur(4.5px);transition:filter .15s;cursor:help;user-select:none;}
  .dev-only:hover{filter:none;user-select:text;}
  .dev-badge{font-size:9px;font-weight:700;letter-spacing:.3px;color:var(--warn);background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:4px;padding:1px 5px;margin-left:6px;text-transform:uppercase;}

  /* modal + toast */
  .modal-bg{position:fixed;inset:0;background:rgba(18,20,28,.4);display:flex;align-items:center;justify-content:center;z-index:40;}
  .modal{width:400px;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(10,15,40,.3);overflow:hidden;}
  .opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;font-size:13px;font-weight:600;color:var(--ink2);background:#fff;border:none;border-radius:8px;padding:10px 12px;cursor:pointer;}
  .opt:hover{background:#f4f5f8;}
  .toast{position:fixed;bottom:24px;left:50%;background:var(--dark);color:#fff;font-size:13px;font-weight:600;border-radius:10px;padding:12px 20px;box-shadow:0 10px 30px rgba(10,15,40,.35);z-index:50;animation:toastIn 2.8s ease forwards;display:flex;align-items:center;gap:10px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .spinner{width:13px;height:13px;border:2px solid var(--accent-border);border-top-color:var(--accent);border-radius:99px;animation:spin .7s linear infinite;display:inline-block;}
  .mock-banner{display:flex;align-items:center;gap:10px;background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--warn);margin-bottom:18px;}
</style>
</head>
<body>
<div class="app">
  <!-- ICON RAIL -->

    <span class="logo"></span>
    <button data-tab="library" title="Corpus library">▦</button>
    <button data-tab="trends" title="Trends explorer">📈</button>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="brand">NoBS Observatory</span>

      </div>
      <div style="display:flex;align-items:center;gap:9px;">
        <span style="display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);border:1px solid var(--line2);border-radius:7px;padding:6px 11px;background:#fff;">Command <span class="kbd">⌘K</span></span>

</div>

<div id="overlay"></div>

<input type="file" id="filepick" accept=".csv,.jsonl,.txt" style="display:none" />

<script>
//// ---------------------------------------------------------------- state
const TABS = [
  ["library","Corpus library"],["trends","Trends explorer"],
  ["country","Country deep-dive"],["access","Access & sharing"],
  ["flow","▸ Process & validate"],
];
const STEPS = [["upload","1 · Upload"],["overview","2 · Overview"],["review","3 · Review & reclassify"],["publish","4 · Publish"]];
const PRIV = [
  {name:"Light",     util:"96%", risk:"High",    riskColor:"#e8590c"},
  {name:"Standard",  util:"88%", risk:"Medium",  riskColor:"#f08c00"},
  {name:"High",      util:"74%", risk:"Low",     riskColor:"#2f7d57"},
  {name:"Maximum",   util:"61%", risk:"Minimal", riskColor:"#2f7d57"},
];
// Categories the human reviewer assigns during validation. The model flags &
// scores; the analyst attributes the target group. Reclassifying records a
// correction that (in production) feeds retraining.
const CATS = [
  {id:"religion", label:"Religion",              color:"#6741d9"},
  {id:"ethnicity",label:"Ethnicity / nationality",color:"#1971c2"},
  {id:"gender",   label:"Gender",                color:"#c2255c"},
  {id:"orientation",label:"Sexual orientation",  color:"#e8590c"},
  {id:"political", label:"Political",             color:"#2f9e44"},
  {id:"other",    label:"Other / unsure",        color:"#868e96"},
];
const CAT_MAP = Object.fromEntries(CATS.map(c=>[c.id,c]));
const SEVS = {high:"#e8590c", medium:"#f08c00", low:"#868e96"};

//// ---------------------------------------------------------------- trends / country data
const TREND_STATES = [
  {key:'FI', name:'Finland',  color:'#3b5bdb'},
  {key:'DE', name:'Germany',  color:'#6d28d9'},
  {key:'SE', name:'Sweden',   color:'#0e7490'},
];
const ELECTIONS_BY_STATE = {
  FI: [
    {year:2011, total:6.5,  cats:{religion:24,ethnicity:28,gender:18,orientation:14,political:10,other:6}},
    {year:2015, total:7.8,  cats:{religion:22,ethnicity:34,gender:17,orientation:12,political:10,other:5}},
    {year:2019, total:9.2,  cats:{religion:20,ethnicity:38,gender:16,orientation:11,political:10,other:5}},
    {year:2023, total:11.4, cats:{religion:18,ethnicity:42,gender:15,orientation:10,political:10,other:5}},
  ],
  DE: [
    {year:2013, total:5.0,  cats:{religion:22,ethnicity:24,gender:20,orientation:12,political:14,other:8}},
    {year:2017, total:8.4,  cats:{religion:20,ethnicity:32,gender:16,orientation:11,political:15,other:6}},
    {year:2021, total:9.1,  cats:{religion:21,ethnicity:35,gender:15,orientation:12,political:11,other:6}},
    {year:2025, total:12.8, cats:{religion:19,ethnicity:41,gender:14,orientation:10,political:10,other:6}},
  ],
  SE: [
    {year:2010, total:5.5,  cats:{religion:23,ethnicity:26,gender:21,orientation:13,political:12,other:5}},
    {year:2014, total:7.2,  cats:{religion:21,ethnicity:30,gender:19,orientation:12,political:13,other:5}},
    {year:2018, total:9.8,  cats:{religion:19,ethnicity:36,gender:18,orientation:11,political:11,other:5}},
    {year:2022, total:11.2, cats:{religion:17,ethnicity:40,gender:17,orientation:10,political:11,other:5}},
  ],
  FR: [
    {year:2017, total:7.1,  cats:{religion:24,ethnicity:29,gender:19,orientation:11,political:11,other:6}},
    {year:2022, total:13.4, cats:{religion:24,ethnicity:39,gender:16,orientation:10,political:5, other:6}},
  ],
};
const LEGISLATION_BY_STATE = {
  FI: [
    {year:2019, color:'#3b5bdb', title:'Criminal Code amendment', sub:'Section 11 expanded for online incitement'},
    {year:2022, color:'#6d28d9', title:'EU Digital Services Act', sub:'Nov 2022 · systemic-risk audits'},
  ],
  DE: [
    {year:2017, color:'#3b5bdb', title:'NetzDG enacted', sub:'Jul 2017 · mandatory 24h platform takedowns'},
    {year:2018, color:'#0e7490', title:'NetzDG enforcement ramp', sub:'Jan 2018 · BKA reporting launched'},
    {year:2022, color:'#6d28d9', title:'EU DSA in force', sub:'Nov 2022 · systemic-risk audits'},
  ],
  SE: [
    {year:2018, color:'#3b5bdb', title:'Hate speech provisions expanded', sub:'BrB Ch.16 §8 reformed'},
    {year:2022, color:'#6d28d9', title:'EU DSA in force', sub:'Nov 2022 · systemic-risk audits'},
  ],
  FR: [
    {year:2020, color:'#3b5bdb', title:'Loi Avia partial enforcement', sub:'Jun 2020 · platform takedown duty'},
    {year:2022, color:'#6d28d9', title:'EU DSA in force', sub:'Nov 2022 · systemic-risk audits'},
  ],
};
const COUNTRY_META = {
  FI: {name:'Finland',  electionName:'Eduskunta',    color:'#3b5bdb'},
  DE: {name:'Germany',  electionName:'Bundestag',    color:'#6d28d9'},
  SE: {name:'Sweden',   electionName:'Riksdag',      color:'#0e7490'},
  FR: {name:'France',   electionName:'Presidential', color:'#c2305a'},
};

const S = {
  tab:"flow", step:"upload",
  file:null,            // {name, headers, records(array of obj), column, count}
  privLevel:1,
  proc:"idle",          // idle | running | done
  result:null,          // ProcessResponse
  rows:[],              // processed rows + local review state
  filters:{cats:new Set(), sevs:new Set(), conf:"all", status:"all"},
  sort:"confidence",    // confidence | severity | phate
  sel:new Set(),
  expanded:null,
  picker:null,          // {mode, ids}
  toast:null,
  trendStates:{FI:true,DE:true,SE:true}, trendLeg:true,
  countryKey:'DE',
};

const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
const fmt = (n)=>Number(n).toLocaleString("en-US");

//// ---------------------------------------------------------------- CSV / file parse
function parseCSV(text){
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(cur);cur=""; }
      else if(c==='\n'){ row.push(cur);rows.push(row);row=[];cur=""; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur.length||row.length){ row.push(cur);rows.push(row); }
  return rows.filter(r=>r.length>1||(r.length===1&&r[0]!==""));
}
function loadFile(name, text){
  let headers=[], records=[];
  if(name.endsWith(".jsonl")){
    const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
    records=lines.map(l=>{try{return JSON.parse(l);}catch(e){return {text:l};}});
    headers=[...new Set(records.flatMap(r=>Object.keys(r)))];
  } else if(name.endsWith(".txt")){
    records=text.split(/\n/).map(l=>l.trim()).filter(Boolean).map(t=>({text:t}));
    headers=["text"];
  } else {
    const grid=parseCSV(text);
    if(!grid.length) return null;
    headers=grid[0].map(h=>h.trim());
    records=grid.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]??"");return o;});
  }
  // pick the most text-like column by default
  const guess = headers.find(h=>/text|message|tweet|content|body|post|comment/i.test(h)) || headers[headers.length-1];
  S.file={name, headers, records, column:guess, count:records.length};
  S.proc="idle"; S.result=null; S.rows=[];
}

//// ---------------------------------------------------------------- processing
// Real Qwen generation runs ~0.3-0.4 rows/s on CPU, so process a small sample
// in the interactive demo rather than the whole upload (which would block for
// many minutes). Raise/remove for batch runs via the CLI.
const CLIENT_SAMPLE_CAP = 15;
async function runProcessing(){
  if(!S.file) return;
  S.proc="running"; S.step="upload"; render();
  const allRows = S.file.records.map(r=>String(r[S.file.column]??"")).filter(t=>t.trim().length);
  const rows = allRows.slice(0, CLIENT_SAMPLE_CAP);
  const capped = allRows.length > rows.length;
  try{
    const resp = await fetch("/api/process",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({rows, privatization_level:S.privLevel, classifier:"hf"}),
    });
    if(!resp.ok){ throw new Error((await resp.json()).detail || resp.statusText); }
    const data = await resp.json();
    S.result = data;
    // cat starts as the model-assigned target group; reclassified flags a human override.
    S.rows = data.rows.map(r=>({...r, cat:r.category||null, modelCat:r.category||null, reclassified:false, validated:false, dismissed:false}));
    S.proc="done"; S.step="overview";
    const via = data.classifier==="hf" ? "unbiased-toxic-roberta" : "lexicon proxy";
    toast(`Processed ${fmt(data.count)} messages${capped?` (sample of ${fmt(allRows.length)})`:""} · ${fmt(data.flagged)} flagged · labelled by ${via}`);
  }catch(e){
    S.proc="idle";
    toast("Processing failed: "+e.message);
  }
  render();
}

//// ---------------------------------------------------------------- review helpers
function visibleRows(){
  let rows = S.rows.filter(r=>!r.dismissed);
  const f=S.filters;
  if(f.status==="flagged") rows=rows.filter(r=>r.flagged);
  else if(f.status==="clean") rows=rows.filter(r=>!r.flagged);
  if(f.cats.size) rows=rows.filter(r=> r.cat ? f.cats.has(r.cat) : f.cats.has("__unrev"));
  if(f.sevs.size) rows=rows.filter(r=>f.sevs.has(r.severity));
  if(f.conf==="low") rows=rows.filter(r=>r.confidence_band==="low");
  else if(f.conf==="medlow") rows=rows.filter(r=>r.confidence_band!=="high");
  const sevRank={high:0,medium:1,low:2,none:3};
  if(S.sort==="confidence") rows.sort((a,b)=>a.confidence-b.confidence);
  else if(S.sort==="severity") rows.sort((a,b)=>sevRank[a.severity]-sevRank[b.severity]);
  else rows.sort((a,b)=>(b.p_hate_original||0)-(a.p_hate_original||0));
  return rows;
}
function validatedCount(){ return S.rows.filter(r=>r.validated&&!r.dismissed).length; }
function reclassifiedCount(){ return S.rows.filter(r=>r.reclassified).length; }

//// ---------------------------------------------------------------- actions
function go(tab){ S.tab=tab; S.expanded=null; render(); }
function goStep(step){ if(step!=="upload"&&S.proc!=="done"){return;} S.step=step; S.expanded=null; render(); }
function setPriv(v){ S.privLevel=+v; render(); }
function toast(msg){ S.toast=msg; render(); clearTimeout(toast._t); toast._t=setTimeout(()=>{S.toast=null;render();},2800); }

function toggleSel(id){ S.sel.has(id)?S.sel.delete(id):S.sel.add(id); render(); }
function clearSel(){ S.sel.clear(); render(); }
function selectAllVisible(){ const v=visibleRows(); const all=v.every(r=>S.sel.has(r.id)); v.forEach(r=>all?S.sel.delete(r.id):S.sel.add(r.id)); render(); }

function openPicker(mode, ids){ if(!ids.length)return; S.picker={mode, ids}; render(); }
function closePicker(){ S.picker=null; render(); }
function applyPick(value){
  const {mode,ids}=S.picker;
  ids.forEach(id=>{ const r=S.rows.find(x=>x.id===id); if(!r) return;
    if(mode==="reclassify"){ r.cat=value; r.reclassified=true; r.validated=true; }
    else if(mode==="severity"){ r.severity=value; }
  });
  const n=ids.length;
  closePicker();
  toast(mode==="reclassify" ? `Reclassified ${n} item${n>1?"s":""} → ${CAT_MAP[value].label}` : `Severity set to ${value} for ${n} item${n>1?"s":""}`);
}
function confirmRows(ids){ ids.forEach(id=>{const r=S.rows.find(x=>x.id===id); if(r)r.validated=true;}); S.sel.clear(); toast(`Confirmed ${ids.length} label${ids.length>1?"s":""}`); }
function dismissRows(ids){ ids.forEach(id=>{const r=S.rows.find(x=>x.id===id); if(r){r.dismissed=true;r.validated=true;}}); ids.forEach(id=>S.sel.delete(id)); toast(`Dismissed ${ids.length} item${ids.length>1?"s":""}`); }

//// ---------------------------------------------------------------- render
function render(){
  renderTabs();
  const sf=$("surface");
  if(S.tab==="flow") sf.innerHTML=viewFlow();
  else if(S.tab==="library") sf.innerHTML=viewLibrary();
  else if(S.tab==="trends") sf.innerHTML=viewTrends();
  else if(S.tab==="country") sf.innerHTML=viewCountry();
  else if(S.tab==="access") sf.innerHTML=viewAccess();
  renderOverlay();
  document.querySelectorAll(".rail button[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===S.tab));
}
function renderTabs(){
  $("tabnav").innerHTML = TABS.map(([id,label])=>
    `<button class="tab ${S.tab===id?"on":""}" data-tab="${id}">${esc(label)}</button>`).join("");
}
function renderOverlay(){
  let html="";
  if(S.picker){
    const isRe=S.picker.mode==="reclassify";
    const opts = isRe
      ? CATS.map(c=>`<button class="opt" data-pick="${c.id}"><span class="cdot" style="background:${c.color}"></span>${esc(c.label)}</button>`).join("")
      : ["high","medium","low"].map(s=>`<button class="opt" data-pick="${s}"><span class="cdot" style="background:${SEVS[s]}"></span><span style="text-transform:capitalize">${s}</span> severity</button>`).join("");
    html += `<div class="modal-bg" data-act="closePicker"><div class="modal" data-stop>
      <div style="padding:15px 18px;border-bottom:1px solid #eef0f4;">
        <div style="font-size:14px;font-weight:700;">${isRe?"Reclassify":"Set severity"} · ${S.picker.ids.length} item${S.picker.ids.length>1?"s":""}</div>
        <div style="font-size:12px;color:var(--faint);margin-top:2px;">${isRe?"Attribute the target group — recorded as a correction":"Override the model-assigned severity"}</div>
      </div>
      <div style="padding:12px;display:flex;flex-direction:column;gap:4px;">${opts}</div>
    </div></div>`;
  }
  if(S.toast){ html += `<div class="toast"><span style="color:#7fe3a4;">✓</span>${esc(S.toast)}</div>`; }
  $("overlay").innerHTML=html;
}

//// ------------------------------------------------ FLOW
function viewFlow(){
  const cur=STEPS.findIndex(s=>s[0]===S.step);
  const stepBtns = STEPS.map(([id,label],idx)=>{
    const cls = S.step===id?"on":(idx<cur&&S.proc==="done"?"done":"");
    const dis = id!=="upload"&&S.proc!=="done";
    return `<button class="step ${cls}" data-step="${id}" ${dis?'style="opacity:.45;cursor:default"':''}>${esc(label)}</button>`;
  }).join("");
  const subnav=`<div class="subnav"><div style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);"><b style="color:var(--ink)">France · 2022 Presidential</b><span style="color:#c2c6d0">▾</span></div>
      <div style="display:flex;gap:4px;margin-left:8px;">${stepBtns}</div></div>`;
  if(S.step==="review")
    return `<div style="display:flex;flex-direction:column;height:100%;">${subnav}${stepReview()}</div>`;
  let body="";
  if(S.step==="upload") body=stepUpload();
  else if(S.step==="overview") body=stepOverview();
  else if(S.step==="publish") body=stepPublish();
  return `<div style="display:flex;flex-direction:column;min-height:100%;">${subnav}${body}</div>`;
}

function stepUpload(){

        <div style="margin-top:14px;display:flex;gap:10px;">
          <div class="field"><div class="l">Country</div><div style="font-size:13.5px;font-weight:600;margin-top:2px;">France ▾</div></div>
          <div class="field"><div class="l">Election</div><div style="font-size:13.5px;font-weight:600;margin-top:2px;">2022 Presidential ▾</div></div>
          <div class="field"><div class="l">Text column</div>
            ${has?`<select data-act="setCol">${colSel}</select>`:`<div style="font-size:13.5px;font-weight:600;margin-top:2px;color:var(--faint)">—</div>`}
          </div>

        <div class="card" style="margin-top:20px;padding:18px;">

          </div>
          <div style="font-size:12px;color:#8b909e;margin-bottom:14px;">One control trades utility for privacy — sets PII threshold, k-anonymity floor and the differential-privacy budget together.</div>

            <div style="flex:1;background:#f6f7fb;border-radius:8px;padding:9px 11px;"><div style="color:var(--faint)">Re-identification risk</div><div style="font-weight:700;font-size:15px;margin-top:1px;color:${p.riskColor};">${p.risk}</div></div>

function stepOverview(){
  const r=S.result; if(!r) return `<div class="wrap"><p class="lede">No corpus processed yet.</p></div>`;
  // Category breakdown (target group) from the real classifier.
  const ch=r.category_hist||{};
  const catBars=CATS.map(c=>({label:c.label,color:c.color,n:ch[c.id]||0}))
    .concat([{label:"Unattributed",color:"#b5bac6",n:ch["unassigned"]||0}])
    .filter(b=>b.n>0).sort((a,b)=>b.n-a.n);
  const useCat = catBars.length>0;
  const sevBars=[
    {label:"High severity",color:SEVS.high,n:r.severity_hist.high},
    {label:"Medium severity",color:SEVS.medium,n:r.severity_hist.medium},
    {label:"Low severity",color:SEVS.low,n:r.severity_hist.low},
  ];
  const showBars = useCat?catBars:sevBars;
  const maxn=Math.max(1,...showBars.map(b=>b.n));
  const bars=showBars.map(b=>`<div style="display:flex;align-items:center;gap:13px;margin-bottom:11px;">
      <span style="width:170px;flex:none;font-size:13px;display:inline-flex;align-items:center;gap:8px;"><span class="cdot" style="background:${b.color}"></span>${b.label}</span>
      <div style="flex:1;height:16px;background:#eef1f6;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${Math.round(100*b.n/maxn)}%;background:${b.color};border-radius:3px;"></div></div>
      <span class="mono" style="width:60px;text-align:right;font-size:12px;color:var(--muted)">${fmt(b.n)}</span>
    </div>`).join("");
  const via = r.classifier==="hf" ? "unbiased-toxic-roberta (multi-label)" : "lexicon proxy";
  return `<div class="wrap" style="max-width:1120px;">
    <h2 class="title">Processed corpus — the whole picture</h2>
    <p class="lede">${fmt(r.count)} messages processed on-device with the “${esc(PRIV[r.privatization_level].name)}” privatisation profile, labelled by <b>${via}</b>. Here's what the model labelled before you validate.</p>
    <div style="display:flex;gap:12px;margin-bottom:20px;">
      <div class="stat"><div class="k">MESSAGES</div><div class="v">${fmt(r.count)}</div></div>
      <div class="stat"><div class="k">FLAGGED</div><div class="v">${fmt(r.flagged)} <span style="font-size:13px;color:var(--faint);font-weight:600;">· ${r.flagged_pct}%</span></div></div>
      <div class="stat"><div class="k">GROUPS</div><div class="v">${fmt(r.clusters)}</div></div>
      <div class="stat" style="border-color:var(--warn-border);background:var(--warn-bg);"><div class="k" style="color:var(--warn)">LOW-CONFIDENCE</div><div class="v" style="color:var(--warn)">${fmt(r.low_confidence)}</div></div>
    </div>
    <div class="card" style="padding:18px 20px;margin-bottom:18px;">

      ${bars}
    </div>
    <div style="display:flex;gap:14px;align-items:center;border:1px solid var(--accent-border);background:var(--accent-soft);border-radius:11px;padding:15px 18px;">
      <div style="flex:1;font-size:13.5px;color:#2a3550;line-height:1.5;"><b>${fmt(r.flagged)} flagged messages</b> across ${fmt(r.clusters)} groups${r.low_confidence?`, including <b>${fmt(r.low_confidence)}</b> low-confidence labels most likely to be wrong`:""}. Start the review there.</div>
      <button class="btn" data-act="goReview">Review &amp; reclassify →</button>
    </div>
  </div>`;
}

function stepReview(){
  const all=S.rows.filter(r=>!r.dismissed);
  const flaggedAll=all.filter(r=>r.flagged);
  const vis=visibleRows();
  const catCounts={}; CATS.forEach(c=>catCounts[c.id]=0); let unrev=0;
  flaggedAll.forEach(r=>{ r.cat?catCounts[r.cat]++:unrev++; });
  const sevCounts={high:0,medium:0,low:0}; flaggedAll.forEach(r=>{if(r.severity in sevCounts)sevCounts[r.severity]++;});
  const f=S.filters;
  const catFacets = [{id:"__unrev",label:"Unreviewed",color:"#b5bac6",count:unrev}]
    .concat(CATS.map(c=>({id:c.id,label:c.label,color:c.color,count:catCounts[c.id]})))
    .map(c=>`<label class="facet-row" data-fcat="${c.id}"><span class="chk ${f.cats.has(c.id)?'on':''}">${f.cats.has(c.id)?'✓':''}</span><span class="cdot" style="background:${c.color}"></span>${esc(c.label)}<span class="mono" style="margin-left:auto;font-size:11px;color:var(--faint)">${c.count}</span></label>`).join("");
  const sevFacets = ["high","medium","low"].map(s=>`<label class="facet-row" data-fsev="${s}"><span class="chk ${f.sevs.has(s)?'on':''}">${f.sevs.has(s)?'✓':''}</span><span class="cdot" style="background:${SEVS[s]}"></span><span style="text-transform:capitalize">${s}</span><span class="mono" style="margin-left:auto;font-size:11px;color:var(--faint)">${sevCounts[s]}</span></label>`).join("");
  const confPresets = [["all","All"],["medlow","< 0.85"],["low","< 0.70"]].map(([k,l])=>`<button class="preset ${f.conf===k?'on':''}" data-fconf="${k}">${l}</button>`).join("");
  const statusPresets = [["flagged","Flagged"],["clean","Clean"],["all","All"]].map(([k,l])=>`<button class="preset ${f.status===k?'on':''}" data-fstatus="${k}">${l}</button>`).join("");

  const vcount=validatedCount();
  const vpct = flaggedAll.length? Math.round(100*vcount/Math.max(flaggedAll.length,1)) : 0;
  const selIds=[...S.sel];
  const allVisSel = vis.length>0 && vis.every(r=>S.sel.has(r.id));

  const rowsHtml = vis.slice(0,400).map(r=>{
    const sel=S.sel.has(r.id);
    const sevColor = r.severity==="none"?"#cdd2de":SEVS[r.severity];
    const cat = r.cat?CAT_MAP[r.cat]:null;
    const confColor = r.confidence_band==="low"?"#b45309":(r.confidence_band==="medium"?"#8b6f00":"#5b6170");
    const expanded=S.expanded===r.id;
    const tr=`<tr class="rowline ${sel?'sel':''}">
      <td style="width:34px;padding:9px 0 9px 18px;"><span class="chk ${sel?'on':''}" data-act="toggleSel" data-id="${r.id}">${sel?'✓':''}</span></td>
      <td style="width:64px;"><span class="mono" style="font-size:12px;">${r.validated?'<span style="color:var(--good)">✓ </span>':''}#${r.id}</span></td>
      <td style="padding:9px 12px 9px 0;font-size:13px;color:var(--ink2);cursor:pointer;" data-act="expand" data-id="${r.id}">${esc(r.x_priv||"—")}<span style="color:var(--faint);font-size:11px;margin-left:8px;">${expanded?'▴ hide audit':'▾ audit'}</span></td>
      <td style="width:170px;font-size:12px;">${cat?`<span class="catbadge"><span class="cdot" style="background:${cat.color}"></span>${esc(cat.label)}</span>`:`<span style="color:var(--faint);">unreviewed</span>`}</td>
      <td style="width:96px;"><span class="mono" style="font-size:12px;color:${confColor}">${r.confidence.toFixed(2)}</span></td>
      <td style="width:78px;"><span class="sevbadge" style="color:${sevColor};background:${r.severity==='none'?'#f1f2f6':sevColor+'22'}">${r.severity==='none'?'clean':r.severity}</span></td>
      <td style="width:96px;padding-right:16px;"><div style="display:flex;justify-content:flex-end;gap:4px;">
        <button class="iconbtn" title="Reclassify" data-act="reOne" data-id="${r.id}">✎</button>
        <button class="iconbtn" title="Confirm" data-act="confirmOne" data-id="${r.id}">✓</button>
        <button class="iconbtn" title="Dismiss" data-act="dismissOne" data-id="${r.id}">✕</button>
      </div></td>
    </tr>`;
    if(!expanded) return tr;
    const detail=`<tr><td colspan="7" class="detail">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
        <div><div class="label" style="margin-bottom:5px;">ORIGINAL (on-device only)<span class="dev-badge">dev only · never published</span></div><div class="dev-only" title="On-device raw text — never leaves the device in production. Blurred here; hover to reveal (dev/audit only)." style="font-size:12.5px;">${esc(r.original)}</div></div>
        <div><div class="label" style="margin-bottom:5px;">ANONYMISED (x_priv · published)</div><div style="font-size:12.5px;">${esc(r.x_priv)}</div></div>
      </div>
      <div style="display:flex;gap:24px;margin-top:12px;" class="mono">
        <span style="font-size:11.5px;color:var(--muted)">P(hate) orig <b style="color:var(--ink)">${r.p_hate_original!=null?r.p_hate_original.toFixed(2):'—'}</b></span>
        <span style="font-size:11.5px;color:var(--muted)">P(hate) anon <b style="color:var(--ink)">${r.p_hate_x_priv!=null?r.p_hate_x_priv.toFixed(2):'—'}</b></span>
        <span style="font-size:11.5px;color:var(--muted)">tokens changed <b style="color:var(--ink)">${r.tokens_changed}</b></span>
        <span style="font-size:11.5px;color:var(--muted)">ε total <b style="color:var(--ink)">${r.epsilon_total!=null?r.epsilon_total.toFixed(1):'—'}</b></span>
        ${r.fallback?'<span style="font-size:11.5px;color:var(--warn)">⚠ fallback</span>':''}
      </div></td></tr>`;
    return tr+detail;
  }).join("");

  const bulkBar = selIds.length? `<div style="display:flex;align-items:center;gap:11px;padding:9px 18px;border-bottom:1px solid var(--line);background:var(--accent-soft);flex:none;">
      <span class="chk on" style="cursor:default">✓</span>
      <span style="font-size:12.5px;color:#2a3550;font-weight:600;">${selIds.length} item${selIds.length>1?'s':''} selected</span>
      <span style="height:18px;width:1px;background:var(--accent-border);"></span>
      <button class="btn" style="padding:6px 13px;font-size:12px;" data-act="bulkReclassify">Reclassify…</button>
      <button class="btn-ghost" data-act="bulkSeverity">Set severity</button>
      <button class="btn-soft" data-act="bulkDismiss">Dismiss</button>
      <button class="btn-soft" style="margin-left:auto;color:var(--good);border-color:var(--good-border);" data-act="bulkConfirm">✓ Confirm labels</button>
      <button style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;" data-act="clearSel">Clear</button>
    </div>`:"";

  return `<div style="display:flex;flex:1;min-height:0;">
    <div class="facets scroll">
      <div class="label" style="margin-bottom:10px;">STATUS</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">${statusPresets}</div>
      <div class="facet-h"><span class="label">CATEGORY (assigned)</span>${f.cats.size?`<span data-act="clearCats" style="font-size:10.5px;color:var(--accent);cursor:pointer;">clear</span>`:''}</div>
      <div style="display:flex;flex-direction:column;gap:2px;">${catFacets}</div>
      <div class="facet-h"><span class="label">CONFIDENCE</span></div>
      <div style="display:flex;gap:5px;">${confPresets}</div>
      <div class="facet-h"><span class="label">SEVERITY</span></div>
      <div style="display:flex;flex-direction:column;gap:2px;">${sevFacets}</div>
    </div>

function buildLineChartSVG(series, opts){
  const W=opts.w||560, H=opts.h||180;
  const padL=opts.padL??34, padR=opts.padR??12, padT=opts.padT??14, padB=opts.padB??22;
  const yMax=opts.yMax, xMin=opts.xMin, xMax=opts.xMax;
  const xAt=yr=>padL+(yr-xMin)/(xMax-xMin)*(W-padL-padR);
  const yAt=v=>H-padB-(Math.min(v,yMax)/yMax)*(H-padB-padT);
  const parts=[];
  (opts.yTicks||[]).forEach(t=>{
    const y=yAt(t);
    parts.push(`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#f1f2f6" stroke-width="1"/>`);
    if(opts.yLabels) parts.push(`<text x="${padL-5}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-family="Spline Sans Mono,monospace" font-size="9" fill="#9aa0ae">${t}%</text>`);
  });
  parts.push(`<line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#e7e9ef" stroke-width="1"/>`);
  if(opts.xLabels)(opts.xTicks||[]).forEach(yr=>{
    parts.push(`<text x="${xAt(yr).toFixed(1)}" y="${H-padB+13}" text-anchor="middle" font-family="Spline Sans Mono,monospace" font-size="9" fill="#9aa0ae">${yr}</text>`);
  });
  (opts.markers||[]).forEach(m=>{
    const x=xAt(m.year).toFixed(1);
    parts.push(`<line x1="${x}" y1="${padT}" x2="${x}" y2="${H-padB}" stroke="#c2305a" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.55"/>`);
    if(m.label) parts.push(`<text x="${x}" y="${padT-3}" text-anchor="middle" font-family="Spline Sans Mono,monospace" font-size="8" fill="#c2305a">${m.label}</text>`);
  });
  series.forEach(s=>{
    const pts=s.points.map(p=>`${xAt(p.year).toFixed(1)},${yAt(p.val).toFixed(1)}`).join(' ');
    parts.push(`<polyline fill="none" stroke="${s.color}" stroke-width="${opts.thick||2}" stroke-linejoin="round" stroke-linecap="round" points="${pts}"/>`);
    s.points.forEach(p=>{
      const r=opts.dot||3, cx=xAt(p.year).toFixed(1), cy=yAt(p.val).toFixed(1);
      parts.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}" stroke="#fff" stroke-width="${r>=3?1.4:0.8}"/>`);
    });
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;overflow:visible;">${parts.join('')}</svg>`;
}

function viewCountry(){

      const deltaHtml=delta!=null?`<span class="mono" style="width:28px;font-size:10px;color:${dc};">${delta>0?'+':''}${delta.toFixed(0)}</span>`:'<span style="width:28px;"></span>';
      return `<div style="display:flex;align-items:center;gap:9px;margin-bottom:7px;">
        <span style="width:105px;flex:none;font-size:11px;display:inline-flex;align-items:center;gap:5px;"><span class="cdot" style="background:${c.color}"></span>${c.label}</span>
        <div style="flex:1;height:11px;background:#eef1f6;border-radius:2px;overflow:hidden;"><div style="height:100%;width:${Math.round(100*v/maxCatPct)}%;background:${c.color};border-radius:2px;"></div></div>
        <span class="mono" style="width:30px;text-align:right;font-size:10.5px;color:var(--muted);">${v}%</span>
        ${deltaHtml}
      </div>`;
    }).join('');
    return `<div class="card" style="padding:15px 17px;">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px;">
        <div>
          <div style="font-size:13.5px;font-weight:800;">${meta.electionName} ${elec.year}</div>
          <div class="mono" style="font-size:10.5px;color:var(--faint);margin-top:2px;">${elec.total}% flagged${diffHtml}</div>
        </div>
        <span style="font-size:11px;font-weight:700;color:${meta.color};background:${meta.color}11;border-radius:99px;padding:3px 10px;">${elec.year}</span>
      </div>
      ${catBars}
    </div>`;
  }).join('');
  const cols=Math.min(elections.length,4);

  return `<div class="wrap" style="max-width:1140px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;">${chips}</div>

    <h2 class="title">${meta.name} · ${meta.electionName}</h2>
    <p class="lede">Hate speech evolution across all available elections. Each card shows the category breakdown for one vote, with ±pt change vs the prior election. Legislation markers appear on the trend line.</p>

    <div style="display:flex;gap:14px;margin-bottom:20px;">
      <div class="card" style="flex:1;padding:16px 18px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:13px;font-weight:700;">Overall hate speech share per election</div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);"><span style="width:14px;height:3px;border-radius:2px;display:inline-block;background:${meta.color};"></span>${meta.name}</div>
        </div>
        ${trendSvg}
        <div class="mono" style="font-size:10.5px;color:var(--faint);margin-top:8px;">${allYrs.join(' · ')}</div>
      </div>
      <div class="card" style="width:265px;flex:none;padding:16px 18px;">
        <div class="label" style="margin-bottom:14px;">LEGISLATION TIMELINE</div>
        ${legEvents.length?`<div style="display:flex;flex-direction:column;gap:14px;">${legEvents.map(l=>`<div style="display:flex;gap:11px;"><span style="width:9px;height:9px;border-radius:99px;background:${l.color};flex:none;margin-top:3px;"></span><div><div style="font-size:12.5px;font-weight:600;">${l.title}</div><div style="font-size:11.5px;color:var(--faint);margin-top:1px;">${l.sub}</div></div></div>`).join('')}</div>`:`<div style="font-size:12.5px;color:var(--faint);">No legislation events recorded for this corpus.</div>`}
      </div>
    </div>

    <div class="label" style="margin-bottom:12px;">CATEGORY BREAKDOWN BY ELECTION · share of flagged content · ±pts vs prior vote</div>
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:14px;">${elecCards}</div>
  </div>`;
}
function viewAccess(){
  const people=[["Renaissance Numérique","Owner · full control","Owner","#3b5bdb","#eef1fc"],["CNRS · Médialab","Anonymised corpus, by request","Researcher","#2f7d57","#e8f3ec"],["EU DisinfoLab","Aggregated stats only","Viewer","#5b6170","#f1f2f6"],["Council of Europe","Aggregated stats only","Viewer","#5b6170","#f1f2f6"]];
  const rows=people.map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f4f5f8;"><div><div style="font-size:13.5px;font-weight:600;">${p[0]}</div><div style="font-size:12px;color:var(--faint);margin-top:1px;">${p[1]}</div></div><span style="font-size:11px;font-weight:700;color:${p[3]};background:${p[4]};border-radius:99px;padding:4px 11px;">${p[2]}</span></div>`).join("");
  return `<div class="wrap" style="max-width:880px;">
    <h2 class="title">Access &amp; sharing</h2>
    <p class="lede">You stay the corpus owner. Any legal request for underlying raw data comes to you — the Observatory only ever holds the anonymised result.</p>
    ${mockBanner("Prototype access list.")}
    <div class="card" style="overflow:hidden;"><div style="padding:13px 16px;border-bottom:1px solid #eef0f4;font-size:13px;font-weight:700;">Who has access</div>${rows}</div>
  </div>`;
}
function mockBanner(t){ return `<div class="mock-banner"><span>◐</span><span>${esc(t)}</span></div>`; }

//// ---------------------------------------------------------------- events
document.addEventListener("click",(e)=>{
  const tabBtn=e.target.closest("[data-tab]"); if(tabBtn){ go(tabBtn.dataset.tab); return; }
  const stepBtn=e.target.closest("[data-step]"); if(stepBtn){ goStep(stepBtn.dataset.step); return; }
  const fcat=e.target.closest("[data-fcat]"); if(fcat){ const id=fcat.dataset.fcat; S.filters.cats.has(id)?S.filters.cats.delete(id):S.filters.cats.add(id); render(); return; }
  const fsev=e.target.closest("[data-fsev]"); if(fsev){ const s=fsev.dataset.fsev; S.filters.sevs.has(s)?S.filters.sevs.delete(s):S.filters.sevs.add(s); render(); return; }
  const fconf=e.target.closest("[data-fconf]"); if(fconf){ S.filters.conf=fconf.dataset.fconf; render(); return; }
  const fstatus=e.target.closest("[data-fstatus]"); if(fstatus){ S.filters.status=fstatus.dataset.fstatus; render(); return; }
  const pick=e.target.closest("[data-pick]"); if(pick){ applyPick(pick.dataset.pick); return; }

  const act=e.target.closest("[data-act]"); if(!act) return;
  const id = act.dataset.id!=null? +act.dataset.id : null;
  const A=act.dataset.act;
  switch(A){
    case "pickFile": $("filepick").click(); break;
    case "useSample": loadSample(); break;
    case "setCol": break;
    case "priv": break;
    case "process": runProcessing(); break;
    case "goOverview": goStep("overview"); break;
    case "goReview": goStep("review"); break;
    case "goCountry": go("country"); break;
    case "toggleTrendState": { const k=act.dataset.key; S.trendStates[k]=!S.trendStates[k]; render(); break; }
    case "toggleLeg": S.trendLeg=!S.trendLeg; render(); break;
    case "setCountry": S.countryKey=act.dataset.key; render(); break;
    case "cycleSort": S.sort = S.sort==="confidence"?"severity":(S.sort==="severity"?"phate":"confidence"); render(); break;
    case "toggleSel": toggleSel(id); break;
    case "selectAll": selectAllVisible(); break;
    case "clearSel": clearSel(); break;
    case "clearCats": S.filters.cats.clear(); render(); break;
    case "expand": S.expanded = S.expanded===id?null:id; render(); break;
    case "reOne": openPicker("reclassify",[id]); break;
    case "confirmOne": confirmRows([id]); render(); break;
    case "dismissOne": dismissRows([id]); render(); break;
    case "bulkReclassify": openPicker("reclassify",[...S.sel]); break;
    case "bulkSeverity": openPicker("severity",[...S.sel]); break;
    case "bulkConfirm": confirmRows([...S.sel]); render(); break;
    case "bulkDismiss": dismissRows([...S.sel]); render(); break;
    case "closePicker": if(!e.target.closest("[data-stop]")) closePicker(); break;
    case "publish": toast("Published to the Observatory ✓ — corrections queued for retraining"); break;
  }
});
document.addEventListener("change",(e)=>{
  if(e.target.closest("[data-act='setCol']")){ S.file.column=e.target.value; render(); }
});
document.addEventListener("input",(e)=>{
  if(e.target.closest("[data-act='priv']")){ setPriv(e.target.value); }
});
$("filepick").addEventListener("change", (e)=>{
  const file=e.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ loadFile(file.name, rd.result); render(); };
  rd.readAsText(file);
  e.target.value="";
});
document.addEventListener("dragover",(e)=>{ if(e.target.closest("#drop")){e.preventDefault(); e.target.closest("#drop").classList.add("hot");}});
document.addEventListener("dragleave",(e)=>{ const d=e.target.closest("#drop"); if(d)d.classList.remove("hot");});
document.addEventListener("drop",(e)=>{ const d=e.target.closest("#drop"); if(!d)return; e.preventDefault(); d.classList.remove("hot");
  const file=e.dataTransfer.files[0]; if(!file)return; const rd=new FileReader(); rd.onload=()=>{loadFile(file.name,rd.result);render();}; rd.readAsText(file);});

document.addEventListener("keydown",(e)=>{
  if(S.tab!=="flow"||S.step!=="review"||S.picker) return;
  if(["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName)) return;
  const ids=[...S.sel]; if(!ids.length) return;
  if(e.key==="e"||e.key==="E"){ openPicker("reclassify",ids); }
  else if(e.key==="x"||e.key==="X"){ dismissRows(ids); render(); }
  else if(e.key==="Enter"){ confirmRows(ids); render(); }
  else if(e.key==="a"||e.key==="A"){ selectAllVisible(); }
});

async function loadSample(){
  try{
    const resp=await fetch("/static/sample_election_FR_2022.csv");
    const text=await resp.text();
    loadFile("election_FR_2022.csv", text);
    toast(`Loaded sample · ${fmt(S.file.count)} rows`);
  }catch(e){ toast("Could not load sample corpus"); }
  render();
}

render();
</script>
