# Composed TRIAGE-DP demo config — all four layers active.
#
#   Layer 1  cross-saliency triage   SaliencyTriageRouter (occlusion)
#   Layer 2  stylometric prior        BiberStylometricPrior
#   Layer 3  trade-off calibration    CalibrateTOOptimizer (dev-set driven)
#   Layer 4  sentence rewrite          EM-HSD v2 orchestrator
#
# Extends the mock test config so generation/MLM stay download-free and fast;
# Layer 1's occlusion classifier loads unitary/unbiased-toxic-roberta from the
# HF cache (run the server/CLI with EM_HSD_ALLOW_DOWNLOADS=1, HF offline).
extends: em-hsd-v2-test.yaml

saliency:
  enabled: true
  model: unitary/unbiased-toxic-roberta
  threshold: 0.10

triage_dp:
  enabled: true
  layer1:
    threshold: 0.10
    probes: []
  layer2:
    biber_boosts: {}
  layer3:
    optimizer: random_search
    trials: 5
  layer4:
    ref: em_hsd_v2
