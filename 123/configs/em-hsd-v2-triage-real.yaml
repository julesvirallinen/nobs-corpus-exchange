# Fully real composed TRIAGE-DP — NO mock/hash/simple stand-ins anywhere.
#   mlm:        embedding   (ε₁ = exponential mechanism over all-MiniLM neighbours)
#   embedding:  hf          (real all-MiniLM → the tau_sem MEANING gate is live)
#   utility:    hf          (unitary/unbiased-toxic-roberta)
#   generation: transformers (real Qwen2.5-0.5B paraphraser)
#   saliency + triage_dp on (Layers 1-3 real)
# Run with EM_HSD_ALLOW_DOWNLOADS=1 + HF offline (all models are cached).

mlm:
  backend: embedding
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  candidate_vocab: data/vocab/epsilon1_candidates.txt
  top_k: 24
  clip: 5.0
  include_original: true

epsilon:
  protected: skip
  function_word: skip
  content: 6.0
  default: 6.0

protection:
  enabled: true

normalization:
  lowercase: true
  collapse_whitespace: true
  normalize_punctuation: true
  strip_emoji: true
  repair_elongation: true
  fix_misspellings: true

lexicon:
  source: test
  path: ../spine/data/lexicons/hate_terms.txt
  test_terms:
    - zibber
    - florbnax
    - grumblefric
    - dummy
    - doofus
    - nitwit
  max_inter_char_gap: 2

saliency:
  enabled: true
  model: unitary/unbiased-toxic-roberta
  threshold: 0.10

utility:
  backend: hf
  model: unitary/unbiased-toxic-roberta
  score_label: toxicity

em_hsd_v2:
  epsilon_total: 18.0
  epsilon_split: 0.5
  k_generate: 4          # more candidates so privacy-aware selection has choices
  k_max_after_prune: 4
  tau_dup: 0.80
  generation_temperature: 0.95   # more divergent rewrites -> lower re-identification
  hate_floor_delta: 0.15
  tau_sem_min: 0.28
  min_edit_ratio: 0.04
  privacy_weight: 0.6    # prefer the most surface-divergent faithful candidate
  clip: 5.0
  use_refined_delta_u: true

generation:
  backend: transformers   # real Qwen paraphraser — legible end-result texts
  model: Qwen/Qwen2.5-0.5B-Instruct
  load_in_4bit: false
  max_new_tokens: 128

embedding:
  backend: hf
  model: sentence-transformers/all-MiniLM-L6-v2

triage_dp:
  enabled: true
  layer1:
    threshold: 0.10
    probes: []
  layer2:
    biber_boosts: {}
  layer3:
    optimizer: random_search
    trials: 5
  layer4:
    ref: em_hsd_v2
