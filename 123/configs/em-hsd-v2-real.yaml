# EM-HSD 2.0 production-ready config for real hate-speech validation.
# Backends: transformers (Qwen) generative proposer, HF toxicity scorer,
#           sentence-transformer semantic encoder.
# Requires: EM_HSD_ALLOW_DOWNLOADS=1 on first model fetch; weights are cached afterwards.

mlm:
  backend: hash
  model: distilroberta-base
  top_k: 24
  clip: 5.0
  include_original: true

epsilon:
  protected: skip
  function_word: skip
  content: 6.0
  default: 6.0

protection:
  enabled: true

normalization:
  lowercase: true
  collapse_whitespace: true
  normalize_punctuation: true
  strip_emoji: true
  repair_elongation: true
  fix_misspellings: true

lexicon:
  source: real
  path: ../Johnny t0-1.03/data/lexicons/hate_terms.txt
  test_terms: []
  max_inter_char_gap: 2

saliency:
  enabled: false
  model: unitary/unbiased-toxic-roberta
  threshold: 0.15

utility:
  backend: hf
  model: unitary/unbiased-toxic-roberta
  score_label: toxicity

em_hsd_v2:
  epsilon_total: 18.0
  epsilon_split: 0.5
  k_generate: 6
  k_max_after_prune: 4
  tau_dup: 0.80
  token_sanitize_top_m: 32
  generation_temperature: 0.8
  hate_floor_delta: 0.10
  tau_sem_min: 0.55
  min_edit_ratio: 0.08
  clip: 5.0
  use_refined_delta_u: true
  utility_alpha: 1.0

generation:
  backend: transformers
  model: Qwen/Qwen2.5-0.5B-Instruct
  load_in_4bit: false
  max_new_tokens: 128

embedding:
  backend: hf
  model: sentence-transformers/all-MiniLM-L6-v2

triage_dp:
  enabled: false
  layer1:
    threshold: 0.15
    probes: []
  layer2:
    biber_boosts: {}
  layer3:
    optimizer: random_search
    trials: 20
  layer4:
    ref: em_hsd_v2
