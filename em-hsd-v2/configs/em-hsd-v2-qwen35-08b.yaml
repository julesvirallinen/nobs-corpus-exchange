# EM-HSD 2.0 + Unsloth Qwen3.5-0.8B-GGUF (GTX 1060 friendly)
# Use with conda env: em-hsd-qwen  (see scripts/setup_conda_env.sh)

mlm:
  backend: hash
  model: distilroberta-base
  top_k: 24
  clip: 5.0
  include_original: true

epsilon:
  protected: skip
  function_word: skip
  content: 6.0
  default: 6.0

protection:
  enabled: true

normalization:
  lowercase: true
  collapse_whitespace: true
  normalize_punctuation: true
  strip_emoji: true
  repair_elongation: true
  fix_misspellings: true

lexicon:
  source: real
  path: ../Johnny t0-1.03/data/lexicons/hate_terms.txt
  test_terms: []
  max_inter_char_gap: 2

saliency:
  enabled: false
  model: unitary/unbiased-toxic-roberta

utility:
  backend: hf
  model: unitary/unbiased-toxic-roberta
  score_label: toxicity
  label_threshold: 0.5

em_hsd_v2:
  epsilon_total: 18.0
  epsilon_split: 0.5
  k_generate: 2
  k_max_after_prune: 2
  tau_dup: 0.80
  generation_temperature: 0.8
  hate_floor_delta: 0.10
  tau_sem_min: 0.45
  min_edit_ratio: 0.05
  clip: 5.0
  use_refined_delta_u: true

generation:
  backend: llama_cpp
  model: unsloth/Qwen3.5-0.8B-GGUF
  quant: UD-Q4_K_XL
  max_new_tokens: 128
  top_p: 0.8
  top_k: 20
  enable_thinking: false
  llama_server_url: http://127.0.0.1:8001/v1

embedding:
  backend: simple
