# Qwen3.5-0.8B-GGUF via transformers on CPU (Unsloth kernels need CUDA 7.0+)
# Use: CUDA_VISIBLE_DEVICES="" python scripts/test_qwen.py --config configs/em-hsd-v2-qwen35.yaml

mlm:
  backend: hash
  model: distilroberta-base
  top_k: 24
  clip: 5.0
  include_original: true

epsilon:
  protected: skip
  function_word: skip
  content: 6.0
  default: 6.0

protection:
  enabled: true

normalization:
  lowercase: true
  collapse_whitespace: true
  normalize_punctuation: true
  strip_emoji: true
  repair_elongation: true
  fix_misspellings: true

lexicon:
  source: real
  path: ../Johnny t0-1.03/data/lexicons/hate_terms.txt
  test_terms: []
  max_inter_char_gap: 2

saliency:
  enabled: false
  model: unitary/unbiased-toxic-roberta

utility:
  backend: hf
  model: unitary/unbiased-toxic-roberta
  score_label: toxicity
  label_threshold: 0.5

em_hsd_v2:
  epsilon_total: 18.0
  epsilon_split: 0.5
  k_generate: 3
  k_max_after_prune: 3
  tau_dup: 0.80
  generation_temperature: 0.8
  hate_floor_delta: 0.20
  tau_sem_min: 0.30
  min_edit_ratio: 0.03
  clip: 5.0
  use_refined_delta_u: true

generation:
  backend: transformers
  model: unsloth/Qwen3.5-0.8B-GGUF
  load_in_4bit: false
  max_new_tokens: 96

embedding:
  backend: simple
