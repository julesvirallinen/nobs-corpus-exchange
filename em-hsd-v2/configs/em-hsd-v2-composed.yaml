# EM-HSD 2.0 composed profile — Layer 4 inside TRIAGE-DP (after L1–3 token pass).
# Input: T′ (token-sanitized). Call privatize_em_hsd_v2(T_prime, cfg, original_text=x).

mlm:
  backend: hash
  model: distilroberta-base
  top_k: 24
  clip: 5.0
  include_original: true

epsilon:
  protected: skip
  function_word: skip
  content: 6.0
  default: 6.0

protection:
  enabled: true

normalization:
  lowercase: true
  collapse_whitespace: true
  normalize_punctuation: true
  strip_emoji: true
  repair_elongation: true
  fix_misspellings: true

lexicon:
  source: test
  path: ../Johnny t0-1.03/data/lexicons/hate_terms.txt
  test_terms:
    - dummy
    - doofus
  max_inter_char_gap: 2

saliency:
  enabled: false
  model: unitary/unbiased-toxic-roberta
  threshold: 0.15

utility:
  backend: proxy
  model: unitary/unbiased-toxic-roberta
  score_label: toxicity
  label_threshold: 0.5

em_hsd_v2:
  deployment_mode: composed
  epsilon_total: 9.0
  epsilon_split: 1.0
  k_generate: 4
  k_max_after_prune: 4
  tau_dup: 0.80
  token_sanitize_top_m: 32
  generation_temperature: 0.9
  hate_floor_delta: 0.15
  tau_sem_min: 0.35
  min_edit_ratio: 0.03
  clip: 5.0
  use_refined_delta_u: true
  utility_alpha: 1.0

generation:
  backend: mock
  model: unsloth/Qwen3.5-0.8B-GGUF
  load_in_4bit: true
  max_new_tokens: 256

embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  backend: simple
